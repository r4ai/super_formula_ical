name: Update SUPER FORMULA ICS

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 4"

permissions:
  write-all

jobs:
  update-ics:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml

      - name: Install dependencies
        run: uv sync

      - name: Generate ICS
        run: uv run python scripts/superformula_to_ics.py 2025 2026 > superformula.ics

      - name: Detect ICS changes
        id: diff
        run: |
          if git diff --quiet -- superformula.ics; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Install Copilot CLI
        if: steps.diff.outputs.changed == 'true'
        run: |
          curl -fsSL https://gh.io/copilot-install | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate Copilot token
        if: steps.diff.outputs.changed == 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          if [ -z "$COPILOT_GITHUB_TOKEN" ]; then
            echo "::error::Repository secret PERSONAL_ACCESS_TOKEN is not set. A fine-grained PAT with Copilot Requests permission is required."
            exit 1
          fi

          if ! copilot -p "Reply with the single word OK." --model=auto --allow-all --no-ask-user --silent >/dev/null 2>&1; then
            echo "::error::Repository secret PERSONAL_ACCESS_TOKEN is missing, expired, or does not have valid Copilot access."
            exit 1
          fi

      - name: Review ICS changes with Copilot CLI
        id: copilot_review
        if: steps.diff.outputs.changed == 'true'
        continue-on-error: true
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          git diff -- superformula.ics > superformula.diff
          {
            cat .github/prompts/review-superformula-ics.txt
            printf '\n'
            cat superformula.diff
          } | copilot --model=auto --allow-all --no-ask-user --silent > copilot-review.json
          python3 .github/scripts/parse_copilot_review.py

      - name: Create issue for rejected update
        if: steps.diff.outputs.changed == 'true' && (steps.copilot_review.outcome != 'success' || steps.copilot_review.outputs.approved != 'true')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 .github/scripts/create_rejection_issue_files.py
          gh issue create --title "$(cat issue-title.txt)" --body-file issue-body.md

      - name: Fail workflow for rejected update
        if: steps.diff.outputs.changed == 'true' && (steps.copilot_review.outcome != 'success' || steps.copilot_review.outputs.approved != 'true')
        run: |
          echo "Copilot CLI rejected the ICS update."
          exit 1

      - name: Commit updated ICS if approved
        if: steps.diff.outputs.changed == 'true' && steps.copilot_review.outcome == 'success' && steps.copilot_review.outputs.approved == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add superformula.ics
          git commit -m "Update SUPER FORMULA ICS"
          git push origin HEAD:${{ github.event.repository.default_branch }}
